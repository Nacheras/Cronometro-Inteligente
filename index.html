<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retorika - Configura tu sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7fe; }
        .sidebar { background-color: #1a2b56; }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        .btn-mode-inactive { background-color: rgba(255,255,255,0.05); color: rgba(255,255,255,0.4); }
        .btn-mode-active { background-color: white; color: #1a2b56; }
        .time-input { background: rgba(255,255,255,0.1); border: none; border-radius: 0.5rem; width: 60px; height: 45px; text-align: center; font-size: 1.25rem; font-weight: bold; color: white; }
        /* Estilo para las píldoras de categorías */
        .status-pill { 
            background: #eef2ff; 
            color: #6366f1; 
            padding: 6px 16px; 
            border-radius: 999px; 
            font-size: 0.75rem; 
            font-weight: 500; 
            cursor: pointer; 
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .status-pill:hover {
            background: #e0e7ff;
        }
        
        .status-pill.active { 
            background: #0d1b3e !important; 
            color: white !important; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        @media (max-width: 768px) {
            #timerGigante {
                font-size: 20vw; /* El tamaño se ajusta al ancho de la pantalla del móvil */
            }
            .card {
                padding: 1.5rem !important; /* Menos padding en móvil para ganar espacio */
            }
            .sidebar {
                position: fixed;
                z-index: 50;
                height: 100vh;
            }
        }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen">

    <div class="md:hidden bg-[#1a2b56] text-white p-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-white text-[#1a2b56] font-bold w-6 h-6 flex items-center justify-center rounded text-xs">R</div>
            <span class="tracking-widest text-[10px] font-bold uppercase">Retorika</span>
        </div>
        <button onclick="toggleMobileMenu()" class="p-2">Temporizador ☰</button>
    </div>

    <aside id="sidebar" class="sidebar w-full md:w-[320px] text-white p-8 hidden md:flex flex-col shrink-0">
        <div class="flex items-center gap-2 mb-12">
            <div class="bg-white text-[#1a2b56] font-bold w-7 h-7 flex items-center justify-center rounded text-sm">R</div>
            <span class="tracking-widest text-xs font-bold opacity-60 uppercase">Retorika</span>
        </div>

        <div class="flex gap-2 mb-12">
            <button id="btnAsc" onclick="setMode('asc')" class="btn-mode-inactive text-[10px] py-2 px-4 rounded-full flex-1 font-bold uppercase transition-all">▲ Ascendente</button>
            <button id="btnReg" onclick="setMode('reg')" class="btn-mode-active text-[10px] py-2 px-4 rounded-full flex-1 font-bold uppercase transition-all">▼ Regresivo</button>
        </div>

        <div class="flex justify-center mb-6">
            <div class="relative w-44 h-44 border-4 border-dashed border-white/10 rounded-full flex flex-col items-center justify-center">
                <span id="timerDisplay" class="text-4xl font-bold tracking-tighter">03:00</span>
                <span id="statusLabel" class="text-[9px] font-bold tracking-[0.2em] text-blue-400 mt-2 uppercase">Temporizador</span>
            </div>
        </div>

        <div id="selectorTiempo" class="flex items-center justify-center gap-3 mb-8 transition-all duration-300">
            <input type="number" id="minInput" value="03" class="time-input" onchange="updateFromInputs()">
            <span class="text-white/30 font-bold">:</span>
            <input type="number" id="secInput" value="00" class="time-input" onchange="updateFromInputs()">
        </div>

        <div class="flex justify-center gap-3 mb-10">
            <button onclick="resetTimer()" class="bg-white/10 p-3 rounded-xl hover:bg-white/20">↺</button>
            <button id="startBtn" onclick="toggleTimer()" class="bg-white text-[#1a2b56] px-8 py-3 rounded-xl font-bold text-xs uppercase">Start</button>
        </div>

        <div class="mt-auto">
            <p class="text-[9px] uppercase tracking-widest text-blue-300/40 mb-4 font-bold">Tiempos Guardados</p>
            <div id="presetList" class="space-y-1 text-xs"></div>
            <button onclick="saveCurrentAsPreset()" class="text-blue-400/60 text-[10px] font-bold mt-4 ml-3 hover:text-white transition-colors">+ Guardar tiempo actual</button>
        </div>
    </aside>

    <main class="flex-1 p-4 md:p-12 overflow-y-auto">
        <div class="max-w-5xl mx-auto">
            <div id="modoEnfoque" class="hidden flex-col items-center justify-center py-10 md:py-20 mb-10 bg-white rounded-3xl shadow-inner border-2 border-dashed border-slate-100 text-center">
                <span id="timerGigante" class="text-[5rem] md:text-[12rem] font-black tracking-tighter leading-none text-[#0d1b3e]">03:00</span>
                <p id="temaEnfoque" class="text-sm md:text-xl text-slate-400 italic mt-4 font-medium px-4"></p>
            </div>

            <header class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold text-[#0d1b3e]">Configura tu sesión</h2>
                <div class="text-[11px] font-bold text-slate-300 uppercase tracking-wider">Paso 1 de 2 • <span class="text-slate-400">Configuración</span></div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
                <section class="card p-8 col-span-12">
                    <div class="flex items-center gap-2 text-slate-300 text-[10px] font-bold uppercase tracking-widest mb-4">
                        <span>✏️ Tema de Práctica</span>
                    </div>

                    <h3 id="temaDisplay" class="text-2xl font-bold text-[#0d1b3e] mb-8 italic min-h-[60px]">
                        "Selecciona categorías y genera un tema para empezar"
                    </h3>
                    
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-3">Filtrar por categoría:</p>
                    <div id="contenedorCategorias" class="flex flex-wrap gap-2 mb-8">
                        </div>

                    <div class="flex flex-wrap gap-4 items-center border-t border-slate-100 pt-8 mt-4">
    
                    <button onclick="generarTema()" class="bg-[#0d1b3e] text-white px-8 py-3 rounded-xl text-xs font-bold flex items-center gap-2 shadow-lg hover:bg-blue-900 transition-all">
                        🎲 Generar tema
                    </button>
                    
                    <button onclick="generarTema()" class="bg-slate-100 text-slate-500 px-8 py-3 rounded-xl text-xs font-bold hover:bg-slate-200 transition-all">
                        Siguiente tema →
                    </button>
                    
                    <div class="flex-1 min-w-[320px] flex gap-2 ml-auto">
                        <input type="text" id="inputPersonalizado" 
                            placeholder="Escribe aquí tu propio tema..." 
                            class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-xs focus:outline-none focus:border-[#0d1b3e] transition-colors">
                        
                        <button onclick="usarTemaPersonalizado()" 
                                class="bg-[#0d1b3e] text-white px-6 py-3 rounded-xl text-xs font-bold hover:bg-blue-900 shadow-md transition-all whitespace-nowrap">
                            Fijar Tema Personalizado
                        </button>
                    </div>

                </div>
                </section>
            </div>
        </div>
    </main>

    <script>
        let timer;
        let seconds = 180; 
        let isRunning = false;
        let mode = 'reg'; 
        let presets = [
            { name: "Pleno municipal", time: 180 },
            { name: "Rueda de prensa", time: 300 }
        ];

        window.onload = () => { renderPresets(); updateFromInputs(); };

        function setMode(newMode) {
            clearInterval(timer);
            isRunning = false;
            mode = newMode;
            document.getElementById('startBtn').innerText = 'Start';
            document.getElementById('btnAsc').className = mode === 'asc' ? "btn-mode-active text-[10px] py-2 px-4 rounded-full flex-1 font-bold uppercase" : "btn-mode-inactive text-[10px] py-2 px-4 rounded-full flex-1 font-bold uppercase";
            document.getElementById('btnReg').className = mode === 'reg' ? "btn-mode-active text-[10px] py-2 px-4 rounded-full flex-1 font-bold uppercase" : "btn-mode-inactive text-[10px] py-2 px-4 rounded-full flex-1 font-bold uppercase";
            document.getElementById('selectorTiempo').style.opacity = mode === 'asc' ? "0" : "1";
            document.getElementById('statusLabel').innerText = mode === 'asc' ? "Cronómetro" : "Temporizador";
            if(mode === 'asc') seconds = 0; else updateFromInputs();
            renderTime();
        }

        function updateFromInputs() {
            if (mode === 'reg' && !isRunning) {
                const m = parseInt(document.getElementById('minInput').value) || 0;
                const s = parseInt(document.getElementById('secInput').value) || 0;
                seconds = (m * 60) + s;
                renderTime();
            }
        }

        // Función para el menú hamburguesa en móvil
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            if (sidebar.classList.contains('hidden')) {
                sidebar.classList.remove('hidden');
                sidebar.classList.add('flex');
            } else {
                sidebar.classList.add('hidden');
                sidebar.classList.remove('flex');
            }
        }

        // Modificación en toggleTimer para que cierre el menú al empezar en móvil
        function toggleTimer() {
            const btn = document.getElementById('startBtn');
            const modoEnfoque = document.getElementById('modoEnfoque');
            const gridConfig = document.querySelector('.grid');
            const temaActual = document.getElementById('temaDisplay').innerText;

            if (isRunning) {
                clearInterval(timer);
                btn.innerText = 'Start';
            } else {
                // En móvil, si empezamos a entrenar, cerramos el menú lateral para ver el tiempo
                if (window.innerWidth < 768) {
                    document.getElementById('sidebar').classList.add('hidden');
                }

                modoEnfoque.classList.remove('hidden');
                modoEnfoque.classList.add('flex');
                gridConfig.classList.add('opacity-20');
                document.getElementById('temaEnfoque').innerText = temaActual;

                btn.innerText = 'Pause';
                timer = setInterval(() => {
                    mode === 'reg' ? seconds-- : seconds++;
                    renderTime();
                }, 1000);
            }
            isRunning = !isRunning;
        }

        // En la función resetTimer añade esto para volver a la normalidad:
        function resetTimer() {
            clearInterval(timer);
            isRunning = false;
            document.getElementById('startBtn').innerText = 'Start';
            
            // DESACTIVAR MODO ENFOQUE
            document.getElementById('modoEnfoque').classList.add('hidden');
            document.querySelector('.grid').classList.remove('opacity-20');
            
            mode === 'reg' ? updateFromInputs() : (seconds = 0);
            renderTime();
        }

        function renderTime() {
            const displayLateral = document.getElementById('timerDisplay');
            const displayGigante = document.getElementById('timerGigante');
            
            const absSecs = Math.abs(seconds);
            const m = Math.floor(absSecs / 60);
            const s = absSecs % 60;
            const tiempoFormateado = `${seconds < 0 ? '-' : ''}${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            
            // Actualizamos ambos relojes
            displayLateral.innerText = tiempoFormateado;
            displayGigante.innerText = tiempoFormateado;

            // Feedback visual Fucsia en ambos
            const color = (mode === 'reg' && seconds < 0) ? '#ff00ff' : '#0d1b3e';
            displayLateral.style.color = (mode === 'reg' && seconds < 0) ? '#ff00ff' : 'white';
            displayGigante.style.color = color;
        }


        // --- GESTIÓN DE PRESETS MEJORADA ---
        function renderPresets() {
            const list = document.getElementById('presetList');
            list.innerHTML = presets.map((p, i) => {
                const min = Math.floor(p.time / 60);
                const sec = p.time % 60;
                return `
                <div class="flex justify-between items-center py-2 px-3 hover:bg-white/5 rounded-lg group transition-all">
                    <span class="flex-1 cursor-pointer" onclick="applyPreset(${p.time})">${p.name}</span>
                    <div class="flex gap-2 items-center">
                        <span class="font-bold opacity-40">${min}:${String(sec).padStart(2, '0')}</span>
                        <button onclick="editPreset(${i})" class="text-blue-300 opacity-0 group-hover:opacity-100 hover:text-white">✏️</button>
                        <button onclick="deletePreset(${i})" class="text-red-400 opacity-0 group-hover:opacity-100 hover:text-white">✕</button>
                    </div>
                </div>`;
            }).join('');
        }

        function applyPreset(t) {
            document.getElementById('minInput').value = Math.floor(t / 60);
            document.getElementById('secInput').value = t % 60;
            setMode('reg');
        }

        function saveCurrentAsPreset() {
            const name = prompt("Nombre para este tiempo:");
            if (name) {
                const m = parseInt(document.getElementById('minInput').value) || 0;
                const s = parseInt(document.getElementById('secInput').value) || 0;
                const totalSeconds = (m * 60) + s;
                presets.push({ name: name, time: totalSeconds });
                renderPresets();
            }
        }

        function editPreset(index) {
            const p = presets[index];
            const newName = prompt("Nuevo nombre:", p.name);
            const newTimeStr = prompt("Nuevo tiempo (Formato MM:SS):", `${Math.floor(p.time/60)}:${p.time%60}`);
            
            if (newName && newTimeStr) {
                const parts = newTimeStr.split(':');
                const total = (parseInt(parts[0]) * 60) + (parseInt(parts[1]) || 0);
                presets[index] = { name: newName, time: total };
                renderPresets();
            }
        }

        function deletePreset(i) {
            if(confirm("¿Eliminar este tiempo?")) {
                presets.splice(i, 1);
                renderPresets();
            }
        }
                // --- BASE DE DATOS DE TEMAS ---
        const baseDeDatos = {
            "Política local": [
                "La peatonalización del centro histórico",
                "Gestión de presupuestos participativos",
                "El futuro de las fiestas patronales",
                "Mejora del alumbrado público y seguridad"
            ],
            "Economía": [
                "Impacto de la inflación en la cesta de la compra",
                "Fomento del emprendimiento juvenil",
                "La crisis de la vivienda y el alquiler",
                "Digitalización del pequeño comercio"
            ],
            "Educación": [
                "Uso de móviles en las aulas",
                "Importancia de la educación emocional",
                "La FP dual como salida laboral",
                "Becas de comedor y equidad escolar"
            ],
            "Sanidad": [
                "Listas de espera en atención primaria",
                "Salud mental en el sistema público",
                "Telemedicina: ¿ventaja o barrera?",
                "Prevención de adicciones en adolescentes"
            ],
            "Debate ideológico": [
                "Límites a la libertad de expresión",
                "El papel del Estado en la vida privada",
                "Globalización vs. Soberanía nacional",
                "Igualdad de oportunidades y meritocracia"
            ],
            "Medios de comunicación": [
                "El impacto de las fake news en democracia",
                "Responsabilidad de los influencers",
                "Crisis de los medios tradicionales",
                "Privacidad en la era de los algoritmos"
            ]
        };

        let categoriasSeleccionadas = [];

        // 1. Dibuja las categorías en pantalla
        function renderCategorias() {
            const contenedor = document.getElementById('contenedorCategorias');
            if (!contenedor) return;
            
            contenedor.innerHTML = '';
            
            Object.keys(baseDeDatos).forEach(cat => {
                const pill = document.createElement('span');
                pill.innerText = cat;
                
                // Comprobar si ya estaba seleccionada para mantener el color
                const isActive = categoriasSeleccionadas.includes(cat);
                pill.className = `status-pill ${isActive ? 'active' : ''}`;
                
                // Evento de clic
                pill.onclick = function() {
                    if (categoriasSeleccionadas.includes(cat)) {
                        // Si ya está, la quitamos
                        categoriasSeleccionadas = categoriasSeleccionadas.filter(c => c !== cat);
                        this.classList.remove('active');
                    } else {
                        // Si no está, la añadimos
                        categoriasSeleccionadas.push(cat);
                        this.classList.add('active');
                    }
                };
                
                contenedor.appendChild(pill);
            });
        }

        // 2. Generar tema basado en lo seleccionado
        function generarTema() {
            const display = document.getElementById('temaDisplay');
            
            if (categoriasSeleccionadas.length === 0) {
                alert("¡Ojo! Selecciona al menos una categoría arriba (haz clic en las etiquetas azules).");
                return;
            }

            let poolTemas = [];
            categoriasSeleccionadas.forEach(cat => {
                poolTemas = poolTemas.concat(baseDeDatos[cat]);
            });

            const temaAleatorio = poolTemas[Math.floor(Math.random() * poolTemas.length)];
            display.innerText = `"${temaAleatorio}"`;
            display.classList.add('italic'); // Estilo visual de la imagen
        }
        function usarTemaPersonalizado() {
            // 1. Capturamos el input y el lugar donde se muestra el tema
            const input = document.getElementById('inputPersonalizado');
            const display = document.getElementById('temaDisplay');
            
            // 2. Validamos que el usuario haya escrito algo
            const texto = input.value.trim();
            
            if (texto !== "") {
                // 3. Cambiamos el texto del titular principal
                display.innerText = `"${texto}"`;
                
                // 4. Feedback visual: Limpiamos el input y le damos un efecto suave
                input.value = "";
                display.style.color = "#0d1b3e";
                
                // Opcional: Deseleccionamos categorías para que sepa que está en modo "Personalizado"
                categoriasSeleccionadas = [];
                const pills = document.querySelectorAll('.status-pill');
                pills.forEach(p => p.classList.remove('active'));
                
                console.log("Tema personalizado fijado: " + texto);
            } else {
                alert("Por favor, escribe un tema antes de fijarlo.");
            }
        }

        // Extra: Permitir que funcione también al pulsar la tecla "Enter" en el teclado
        document.getElementById('inputPersonalizado').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                usarTemaPersonalizado();
            }
        });

        // 3. Inicialización
        window.addEventListener('load', () => {
            renderCategorias(); // Esto genera las etiquetas nada más cargar la web
        });
    </script>
</body>
</html>
